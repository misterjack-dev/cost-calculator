<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost Calculator by Jackbakeryman | เครื่องคำนวณต้นทุน & ราคาขาย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =====================================================================
   * THEME: Fresh · Clean  (เขียวสด · น้ำเงินเข้ม · แดงเน้น)
   * ================================================================== */
  :root{
    --bg:#F4F8F6;
    --paper:#FFFFFF;
    --ink:#16261F;
    --ink-soft:#5E6E68;
    --ink-faint:#9DAAA4;
    --line:#E8EFEB;
    --line-mid:#D8E3DD;
    --brand:#16C172;          /* เขียวสด (สีหลัก) */
    --brand-2:#0FA85F;
    --brand-soft:#E4F8EE;
    --navy:#1B2C57;           /* น้ำเงินเข้ม (หัวข้อ) */
    --navy-soft:#EAEEF6;
    --accent:#E4022B;         /* แดง (เน้นราคา เข้ากับโลโก้) */
    --accent-soft:#FFEDF0;
    --green:#16C172;
    --green-soft:#E4F8EE;
    --amber:#F5A524;
    --radius:20px;
    --radius-sm:13px;
    --radius-xs:10px;
    --shadow:0 10px 30px -12px rgba(27,44,87,.18);
    --shadow-sm:0 4px 16px -6px rgba(27,44,87,.14);
    --shadow-hover:0 16px 38px -12px rgba(22,193,114,.32);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 500px at 12% -5%, rgba(22,193,114,.10), transparent 60%),
      radial-gradient(800px 500px at 100% 0%, rgba(27,44,87,.07), transparent 55%),
      var(--bg);
    min-height:100vh;padding:30px 16px 72px;line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1000px;margin:0 auto}
  h1,h2,h3,.font-head{font-family:'Archivo',sans-serif;letter-spacing:-.02em}

  /* ---------- Header / brand ---------- */
  header{text-align:center;margin-bottom:34px}
  .logo-badge{
    display:inline-flex;align-items:center;gap:11px;
    background:var(--paper);padding:7px 18px 7px 7px;border-radius:50px;
    box-shadow:var(--shadow-sm);margin-bottom:20px;border:1px solid var(--line);
  }
  .logo-emoji{
    width:42px;height:42px;border-radius:50%;overflow:hidden;
    background:var(--brand-soft);display:flex;align-items:center;justify-content:center;font-size:22px;
  }
  .logo-emoji img{width:100%;height:100%;object-fit:cover;display:block}
  .brand-name{font-family:'Archivo';font-weight:700;font-size:1rem;
    background:linear-gradient(100deg,var(--brand),var(--navy));-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:2.05rem;font-weight:800;line-height:1.1;
    background:linear-gradient(100deg,var(--brand) 10%,var(--brand-2) 40%,var(--navy));-webkit-background-clip:text;background-clip:text;color:transparent}
  .subtitle{color:var(--ink-soft);font-size:.96rem;margin-top:9px}

  .lang-toggle{display:inline-flex;border-radius:50px;background:var(--paper);margin-top:18px;padding:4px;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
  .lang-toggle button{
    border:none;background:transparent;font-family:'Archivo';font-weight:700;border-radius:50px;
    padding:6px 18px;cursor:pointer;color:var(--ink-soft);font-size:.85rem;transition:.18s;
  }
  .lang-toggle button.active{background:linear-gradient(100deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 4px 12px -3px rgba(22,193,114,.5)}

  /* ---------- Cards ---------- */
  .card{
    background:var(--paper);border-radius:var(--radius);padding:28px;margin-bottom:22px;
    box-shadow:var(--shadow);border:1px solid var(--line);
  }
  .card-head{display:flex;align-items:center;gap:13px;margin-bottom:6px}
  .card-icon{
    width:44px;height:44px;border-radius:14px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:21px;
  }
  .ic-a{background:var(--navy-soft)} .ic-b{background:var(--brand-soft)} .ic-d{background:var(--green-soft)}
  .ic-prem{background:var(--accent-soft)}
  /* badge นับจำนวนรายการ */
  .count-badge{font-family:'Archivo';font-weight:700;font-size:.82rem;color:var(--brand-2);
    background:var(--brand-soft);padding:4px 12px;border-radius:50px}
  .card-head .count-badge{margin-left:auto}
  .card-head .count-badge + .export-btn{margin-left:10px}
  .count-badge.full{color:#fff;background:var(--accent)}
  .export-btn{font-family:'Archivo','IBM Plex Sans Thai';font-weight:700;font-size:.84rem;
    padding:7px 16px;border-radius:50px;border:1.5px solid var(--brand);color:var(--brand-2);background:var(--brand-soft);cursor:pointer;white-space:nowrap}
  .export-btn:hover{background:var(--brand);color:#fff}
  .export-btn.locked{border-color:var(--line-mid);color:var(--ink-soft);background:var(--paper)}
  .export-btn.locked:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  /* การ์ดฟีเจอร์พรีเมียม */
  .premium-card{background:linear-gradient(140deg,var(--paper),var(--accent-soft))}
  .feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  @media(max-width:560px){.feat-grid{grid-template-columns:1fr}}
  .feat-cat{font-family:'Archivo';font-weight:700;font-size:.92rem;color:var(--navy);margin:6px 0 12px}
  .feat-locked{display:flex;align-items:center;gap:10px;padding:13px 15px;border-radius:var(--radius-xs);
    background:var(--paper);border:1.5px dashed var(--line-mid);color:var(--ink-soft);font-size:.9rem;font-weight:500}
  .feat-locked .lock{font-size:1.1rem;flex-shrink:0}
  .feat-locked.star{border:1.5px solid var(--brand);background:var(--brand-soft);color:var(--brand-2);font-weight:700}
  .feat-locked.bonus{border-style:solid;border-color:var(--accent-soft);background:var(--accent-soft);color:var(--accent)}
  .unlock-btn{width:100%;background:linear-gradient(100deg,var(--accent),#FF4D6D)!important;box-shadow:0 8px 20px -7px rgba(228,2,43,.5)!important}
  .unlock-btn:hover{box-shadow:0 13px 26px -8px rgba(228,2,43,.6)!important}
  .up-price{font-family:'Archivo';font-weight:700;font-size:1.15rem;color:var(--accent);margin-bottom:20px}
  h2{font-size:1.28rem;font-weight:700;color:var(--navy)}
  .card-desc{color:var(--ink-soft);font-size:.89rem;margin-bottom:22px}

  /* ---------- Form ---------- */
  label{display:block;font-family:'IBM Plex Sans Thai';font-weight:600;font-size:.82rem;color:var(--ink-soft);margin-bottom:7px}
  input,select{
    width:100%;font-family:'IBM Plex Sans Thai';font-size:.94rem;color:var(--ink);
    padding:11px 14px;border:1.5px solid var(--line-mid);border-radius:var(--radius-xs);
    background:var(--paper);transition:.18s;outline:none;
  }
  input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}
  input::placeholder{color:var(--ink-faint)}

  .grid{display:grid;gap:15px}
  .form-a{grid-template-columns:1.6fr 1fr 1fr 1.3fr 1.3fr auto;align-items:end}
  .form-bc{grid-template-columns:1.6fr 1fr 1fr 1fr;margin-bottom:18px;align-items:end}
  .form-bc5{grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;margin-bottom:18px;align-items:end}
  .form-bc5>div,.form-bc>div{display:flex;flex-direction:column;justify-content:flex-end;height:100%}
  .form-bc5>div label,.form-bc>div label{flex:1 0 auto;display:flex;align-items:flex-end}
  @media(max-width:760px){.form-bc5{grid-template-columns:1fr 1fr}}
  @media(max-width:480px){.form-bc5{grid-template-columns:1fr}}
  .edit-banner{display:flex;align-items:center;gap:8px;background:var(--brand-soft);border:1px solid var(--line-mid);
    border-radius:var(--radius-xs);padding:11px 15px;margin-bottom:18px;font-weight:600;font-size:.88rem;color:var(--brand)}
  .prow{cursor:pointer}
  .prow:hover{background:var(--brand-soft)!important}
  @media(max-width:760px){.form-a,.form-bc{grid-template-columns:1fr 1fr}}
  @media(max-width:480px){.form-a,.form-bc{grid-template-columns:1fr}}

  button.btn{
    font-family:'Archivo';font-weight:700;font-size:.92rem;cursor:pointer;
    padding:12px 24px;border:none;border-radius:var(--radius-xs);transition:.18s;color:#fff;
    background:linear-gradient(100deg,var(--brand),var(--brand-2));box-shadow:0 8px 20px -7px rgba(22,193,114,.6);
  }
  button.btn:hover{transform:translateY(-2px);box-shadow:0 13px 26px -8px rgba(22,193,114,.7)}
  button.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  button.btn-mint{background:linear-gradient(100deg,var(--green),var(--brand-2));box-shadow:0 8px 20px -7px rgba(22,193,114,.55)}
  button.btn-mint:hover{box-shadow:0 13px 26px -8px rgba(22,193,114,.65)}
  button.ghost{
    font-family:'IBM Plex Sans Thai';font-weight:600;font-size:.84rem;cursor:pointer;background:var(--paper);
    color:var(--ink-soft);border:1.5px solid var(--line-mid);border-radius:var(--radius-xs);padding:7px 14px;transition:.15s;
  }
  button.ghost:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
  button.x{background:var(--accent-soft);border:none;border-radius:var(--radius-xs);width:36px;height:36px;cursor:pointer;color:var(--accent);font-weight:700;font-size:1rem;transition:.15s}
  button.x:hover{background:var(--accent);color:#fff}

  /* ---------- Tables ---------- */
  .table-wrap{overflow-x:auto;margin-top:8px}
  /* ตารางวัตถุดิบ: จำกัดความสูง เลื่อนภายใน ไม่ดันบล็อกอื่น */
  .ing-scroll{max-height:360px;overflow-y:auto;margin-top:8px;border-radius:var(--radius-xs)}
  .ing-scroll table{margin:0}
  .ing-scroll thead th{position:sticky;top:0;background:var(--paper);z-index:2;box-shadow:0 1.5px 0 var(--line-mid)}
  .ing-scroll::-webkit-scrollbar{width:9px}
  .ing-scroll::-webkit-scrollbar-track{background:var(--line);border-radius:50px}
  .ing-scroll::-webkit-scrollbar-thumb{background:var(--brand);border-radius:50px;border:2px solid var(--line)}
  .ing-scroll::-webkit-scrollbar-thumb:hover{background:var(--brand-2)}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th{font-family:'IBM Plex Sans Thai';font-weight:600;color:var(--ink-faint);text-align:left;padding:11px 13px;font-size:.78rem}
  td{padding:13px;border-top:1px solid var(--line)}
  .num{font-variant-numeric:tabular-nums;text-align:right;font-weight:600}
  .mini-input{width:62px;padding:6px 8px;text-align:center;font-weight:700;border-radius:var(--radius-xs)}
  .empty{text-align:center;color:var(--ink-faint);padding:30px}
  .price{color:var(--accent);font-weight:700}
  .profit{color:var(--green);font-weight:700}
  .warn{color:var(--accent);font-size:.78rem;font-weight:700}

  /* ---------- Recipe lines ---------- */
  .line{display:grid;grid-template-columns:1fr 130px 90px 40px;gap:10px;align-items:center;margin-bottom:9px}
  @media(max-width:480px){.line{grid-template-columns:1fr 1fr;}.line .lc{grid-column:1/-1;text-align:left}}
  .qty-wrap{position:relative}
  .qty-wrap span{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:.74rem;color:var(--ink-faint);pointer-events:none}
  .lc{text-align:right;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}

  .total-bar{display:flex;justify-content:space-between;align-items:center;margin-top:18px;
    background:linear-gradient(115deg,var(--brand),var(--brand-2) 50%,var(--navy));border-radius:var(--radius-sm);padding:18px 20px}
  .total-bar .lbl{font-family:'IBM Plex Sans Thai';font-weight:600;color:rgba(255,255,255,.85);font-size:.85rem}
  .total-bar .val{font-family:'Archivo';font-weight:700;font-size:1.3rem;color:#fff}
  .total-bar2{flex-direction:column;align-items:stretch;gap:13px}
  .total-bar2 .tb-batch{display:flex;justify-content:space-between;align-items:center;padding-bottom:13px;border-bottom:1px solid rgba(255,255,255,.25)}
  .total-bar2 .val-sm{font-family:'Archivo';font-weight:600;font-size:1.02rem;color:#fff}
  .total-bar2 .tb-per{display:flex;justify-content:space-between;align-items:center}
  .total-bar2 .tb-per .lbl{font-size:.9rem;color:rgba(255,255,255,.92);font-weight:600}
  .total-bar2 .val-big{font-family:'Archivo';font-weight:800;font-size:2.15rem;color:#fff;line-height:1}

  /* ---------- Follow / footer ---------- */
  .follow{text-align:center;margin-top:32px;border-radius:var(--radius);padding:34px 28px;
    background:linear-gradient(140deg,var(--brand-soft),var(--navy-soft));border:1px solid var(--line)}
  .follow h3{font-size:1.18rem;margin-bottom:8px;
    background:linear-gradient(100deg,var(--brand),var(--navy));-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
  .follow p{color:var(--ink-soft);font-size:.9rem;margin-bottom:18px}
  .follow-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .fl-line-big{display:block;width:100%;box-sizing:border-box;margin-bottom:14px;padding:16px;border-radius:var(--radius-xs);background:#06C755;color:#fff;font-family:'IBM Plex Sans Thai';font-weight:700;font-size:1.02rem;text-decoration:none;box-shadow:0 10px 24px -8px rgba(6,199,85,.6);transition:.18s}
  .fl-line-big:hover{transform:translateY(-2px);box-shadow:0 14px 30px -8px rgba(6,199,85,.7)}
  .follow-links a{
    font-family:'Archivo';font-weight:700;text-decoration:none;font-size:.88rem;color:#fff;
    padding:11px 24px;border-radius:50px;transition:.18s;display:inline-flex;align-items:center;gap:7px;
  }
  .fl-tiktok{background:var(--ink);box-shadow:var(--shadow-sm)}
  .fl-page{background:#1877F2;box-shadow:0 8px 20px -7px rgba(24,119,242,.5)}
  .follow-links a:hover{transform:translateY(-3px)}
  button.btn.fl-share{background:#6B4FBB;box-shadow:0 8px 20px -7px rgba(107,79,187,.5)}
  button.btn.fl-share:hover{box-shadow:0 13px 26px -8px rgba(107,79,187,.65)}
  .formula-note{text-align:center;color:var(--ink-faint);font-size:.78rem;margin-top:24px;line-height:1.9}
  .saved-tag{font-size:.74rem;color:var(--green);font-weight:700;margin-left:6px}

  /* ---------- QR in header ---------- */
  .qr-box{
    display:inline-flex;flex-direction:column;align-items:center;gap:8px;
    background:var(--paper);padding:14px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);border:1px solid var(--line);margin-top:18px;
  }
  .qr-box canvas{border-radius:8px;display:block}
  .qr-box .cap{font-family:'IBM Plex Sans Thai';font-weight:600;font-size:.74rem;color:var(--ink-soft)}
  .head-row{display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap}

  /* ---------- Share toast ---------- */
  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:14px 24px;border-radius:50px;
    font-family:'IBM Plex Sans Thai';font-weight:600;font-size:.9rem;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);
    opacity:0;pointer-events:none;transition:.3s;z-index:200;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Follow popup ---------- */
  .overlay{position:fixed;top:0;left:0;right:0;bottom:0;width:100vw;height:100vh;background:rgba(28,27,34,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;z-index:300}
  .overlay.show{display:block;animation:fade .25s ease}
  .overlay .popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:calc(100% - 40px);max-width:380px}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .popup{
    background:var(--paper);border-radius:var(--radius);padding:34px 28px;max-width:380px;width:100%;text-align:center;
    box-shadow:0 30px 60px -15px rgba(27,44,87,.4);animation:pop .35s cubic-bezier(.18,.89,.32,1.28);
  }
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .popup .pe{font-size:2.8rem;margin-bottom:10px}
  .popup h3{font-size:1.2rem;color:var(--ink);margin-bottom:10px}
  .popup p{color:var(--ink-soft);font-size:.9rem;margin-bottom:22px}
  .popup .pbtns{display:flex;gap:11px;flex-direction:column}
  .popup .pbtns a{
    font-family:'Archivo';font-weight:700;text-decoration:none;font-size:.93rem;color:#fff;
    padding:13px;border-radius:var(--radius-xs);background:linear-gradient(100deg,var(--brand),var(--brand-2));box-shadow:0 8px 20px -7px rgba(22,193,114,.5);transition:.18s;
  }
  .popup .pbtns a:hover{transform:translateY(-2px)}
  .popup .pbtns button{
    font-family:'IBM Plex Sans Thai';font-weight:600;font-size:.85rem;background:none;border:none;
    color:var(--ink-soft);cursor:pointer;padding:6px;text-decoration:underline;
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<!-- ★ ระบบ login + นับโควต้า (กันโกง) — แทรกก่อน script หลัก -->
<script src="auth-quota.js"></script>

<script>
/* =========================================================================
 * BRAND CONFIG — ★ แก้ของคุณตรงนี้จุดเดียว ★
 * ====================================================================== */
const BRAND = {

const UNIT_LABELS={
  kg:{th:"กิโลกรัม (kg)",en:"Kilogram (kg)"},g:{th:"กรัม (g)",en:"Gram (g)"},
  l:{th:"ลิตร (L)",en:"Liter (L)"},ml:{th:"มิลลิลิตร (ml)",en:"Milliliter (ml)"},

  egg:{th:"ฟอง",en:"Egg"},
};
const UNITS={kg:{dim:"mass",f:1000},g:{dim:"mass",f:1},l:{dim:"vol",f:1000},ml:{dim:"vol",f:1},piece:{dim:"count",f:1},egg:{dim:"egg",f:1}};
const UKEYS=Object.keys(UNITS);

/* =========================================================================
 * CALCULATION LOGIC — pure functions
 * ====================================================================== */
function convert(amt,from,to){const a=UNITS[from],b=UNITS[to];if(!a||!b||a.dim!==b.dim)return null;return amt*a.f/b.f;}
function costPerBaseUnit(ing){
  if(!ing.purchaseQuantity||ing.purchaseQuantity<=0)return 0;
  const q=convert(ing.purchaseQuantity,ing.purchaseUnit,ing.baseUnit)??ing.purchaseQuantity;
  return q>0?ing.purchasePrice/q:0;
}
function totalProductCost(prod,byId){
  return prod.ingredients.reduce((s,l)=>{const ing=byId[l.ingredientId];return ing?s+l.quantityUsed*costPerBaseUnit(ing):s;},0);
}
/* กำไร% คิดจาก "ต้นทุน" (แบบแม่ค้า): กำไรที่อยากได้ = ต้นทุน × กำไร%
 * GP เป็นค่าธรรมเนียมแพลตฟอร์มที่หักจากราคาขาย
 * ราคาขาย = (ต้นทุน + กำไรที่อยากได้) ÷ (1 − GP%)  */
function suggestedPrice(cost,gp,margin){
  const d=1-gp/100;
  if(d<=0)return Infinity;            // GP ≥ 100% ขายไม่ได้
  return (cost+cost*margin/100)/d;
}
/* กำไรสุทธิต่อชิ้น = ราคาขาย − ต้นทุน − ค่า GP (ควรเท่ากับ ต้นทุน × กำไร%) */
function netProfit(price,cost,gp){return!isFinite(price)?Infinity:price-cost-price*(gp/100);}

/* วาด QR จาก matrix ที่ฝังไว้ (ไม่ต้องพึ่งเน็ต) */
function drawQR(){
  const cv=document.getElementById("qrCanvas");
  if(!cv||typeof QR_MATRIX==="undefined")return;
  const ctx=cv.getContext("2d");
  const n=QR_MATRIX.length, size=cv.width, pad=4;
  const cell=(size-pad*2)/n;
  ctx.fillStyle="#fff";ctx.fillRect(0,0,size,size);
  ctx.fillStyle="#1B2C57";
  for(let r=0;r<n;r++){
    const row=QR_MATRIX[r];
    for(let c=0;c<n;c++){
      if(row[c]==="1")ctx.fillRect(Math.round(pad+c*cell),Math.round(pad+r*cell),Math.ceil(cell),Math.ceil(cell));
    }
  }
}

function lineHTML(ln,i,map){
  const ing=map[ln.ingredientId];
  const lc=ing?(Number(ln.quantityUsed||0)*costPerBaseUnit(ing)):0;

      ${state.ingredients.map(x=>`<option value="${x.id}" ${x.id===ln.ingredientId?"selected":""}>${esc(ingName(x))}</option>`).join("")}
    </select>
    <div class="qty-wrap">

      <span>${ing?ing.baseUnit:""}</span>

    <div class="lc" id="lc${i}">฿${baht(lc)}</div>
    <button class="x" onclick="removeLine(${i})">✕</button>

}

function setLang(l){lang=l;render();}

function syncBaseUnit(initOnly){
  const pu=document.getElementById("ia_pu"),bu=document.getElementById("ia_bu");
  if(!pu||!bu)return;
  const dim=UNITS[pu.value].dim;
  const opts=UKEYS.filter(k=>UNITS[k].dim===dim);
  const cur=bu.value;
  bu.innerHTML=opts.map(k=>`<option value="${k}">${tu(k)}</option>`).join("");
  bu.value=opts.includes(cur)?cur:opts[opts.length-1];
}

function addIngredient(){
  const name=document.getElementById("ia_name").value.trim();
  const price=Number(document.getElementById("ia_price").value);
  const qty=Number(document.getElementById("ia_qty").value);
  if(!name||price<=0||qty<=0)return;
  state.ingredients.push({id:uid(),nameKey:null,name,purchasePrice:price,purchaseQuantity:qty,
    purchaseUnit:document.getElementById("ia_pu").value,baseUnit:document.getElementById("ia_bu").value});
  save();render();
}
function removeIngredient(id){
  state.ingredients=state.ingredients.filter(i=>i.id!==id);
  state.products.forEach(p=>p.ingredients=p.ingredients.filter(l=>l.ingredientId!==id));
  state.draft.lines=state.draft.lines.filter(l=>l.ingredientId!==id);
  save();render();
}

function draftSet(k,v){state.draft[k]=v;}
function draftCost(map){
  return totalProductCost({ingredients:state.draft.lines
    .filter(l=>l.ingredientId&&Number(l.quantityUsed)>0)
    .map(l=>({ingredientId:l.ingredientId,quantityUsed:Number(l.quantityUsed)}))},map);
}
/* ต้นทุนต่อชิ้น = (ต้นทุนวัตถุดิบ ÷ จำนวนชิ้น) + ค่าบรรจุภัณฑ์ต่อชิ้น */
function draftPieces(){const y=Number(state.draft.yield);return y>0?y:1;}
function draftPackCost(){return Number(state.draft.pack)||0;}
function draftPerPieceVal(map){return draftCost(map)/draftPieces()+draftPackCost();}
function draftPerPiece(map){
  const per=draftPerPieceVal(map);
  if(draftCost(map)<=0&&draftPackCost()<=0)return "";
  return (lang==='th'?"≈ ฿"+baht(per)+" /ชิ้น":"≈ ฿"+baht(per)+" /pc");
}
/* ต้นทุนต่อชิ้นแบบสั้น (ตัวเลขใหญ่ ใช้ในแถบสรุป) */
function draftPerPieceShort(map){
  if(draftCost(map)<=0&&draftPackCost()<=0)return "฿0.00";
  return "฿"+baht(draftPerPieceVal(map));
}
/* อัปเดตยอดรวม + ต้นทุนต่อบรรทัด แบบไม่ render ใหม่ (กัน cursor กระเด้ง) */
function updateDraftTotals(){
  const map=byId();
  state.draft.lines.forEach((ln,i)=>{
    const ing=map[ln.ingredientId];
    const lc=ing?(Number(ln.quantityUsed||0)*costPerBaseUnit(ing)):0;
    const el=document.getElementById("lc"+i);if(el)el.textContent="฿"+baht(lc);
  });
  const tot=document.getElementById("draftTotal");if(tot)tot.textContent="฿"+baht(draftCost(map));
  const per=document.getElementById("draftPer");if(per)per.textContent=draftPerPieceShort(map);
  const sv=document.querySelector(".btn-mint");if(sv)sv.disabled=!draftValid();
}
function lineQty(i,v){state.draft.lines[i].quantityUsed=v;updateDraftTotals();}
function draftYield(v){state.draft.yield=v;updateDraftTotals();}
function draftPack(v){state.draft.pack=v;updateDraftTotals();}
function draftValid(){return state.draft.name.trim()&&state.draft.lines.some(l=>Number(l.quantityUsed)>0);}
function addLine(){if(!state.ingredients.length)return;state.draft.lines.push({ingredientId:state.ingredients[0].id,quantityUsed:""});render();}
function lineSet(i,k,v){state.draft.lines[i][k]=v;render();}
function removeLine(i){state.draft.lines.splice(i,1);render();}

async function saveProduct(){
  if(!draftValid())return;
  const data={
    name:state.draft.name.trim(),
    ingredients:state.draft.lines.filter(l=>Number(l.quantityUsed)>0).map(l=>({ingredientId:l.ingredientId,quantityUsed:Number(l.quantityUsed)})),
    gpFeePercent:Number(state.draft.gp)||0,
    desiredMarginPercent:Number(state.draft.margin)||0,
    yieldCount:Number(state.draft.yield)>0?Number(state.draft.yield):1,
    packCost:Number(state.draft.pack)||0,
  };
  if(state.editingId){
    // โหมดแก้ไข — อัปเดตสินค้าเดิม
    const p=state.products.find(x=>x.id===state.editingId);
    if(p)Object.assign(p,data);
    state.editingId=null;
    state.draft={name:"",lines:[],gp:"",margin:"",yield:"",pack:""};
    save();render();
    return;
  }
  // โหมดเพิ่มใหม่ — เช็คโควต้าจาก backend ก่อน (กันโกง)
  if(!BRAND.isPremium){
    if(window.JackAuth && JackAuth.ready){
      const allowed = await JackAuth.consumeQuota();
      // อัปเดตสถานะ premium ให้ตรงกับ backend (เผื่อเพิ่งจ่ายเงิน)
      if(JackAuth.isPremium) BRAND.isPremium=true;
      if(!allowed){ showUpgrade(); return; }
    } else {
      // fallback: ถ้า backend ยังไม่พร้อม ใช้ลิมิตเดิมกันพลาด
      if(state.products.length>=BRAND.freeLimit){ showUpgrade(); return; }
    }
  }
  const isFirst=state.products.length===0;
  state.products.push({id:uid(),...data});
  state.draft={name:"",lines:[],gp:"",margin:"",yield:"",pack:""};
  save();render();
  if(isFirst && !localStorage.getItem("costcalc_followed")){
    try{localStorage.setItem("costcalc_followed","1");}catch(e){}
    setTimeout(()=>{const o=document.getElementById("overlay");if(o)o.classList.add("show");},400);
  }
}

/* คลิกแถวสินค้า → โหลดสูตรกลับมาแก้ในฟอร์มด้านบน */
function editProduct(id){
  const p=state.products.find(x=>x.id===id);if(!p)return;
  state.editingId=id;
  state.draft={
    name:p.name,
    lines:p.ingredients.map(l=>({ingredientId:l.ingredientId,quantityUsed:String(l.quantityUsed)})),
    gp:String(p.gpFeePercent),
    margin:String(p.desiredMarginPercent),
    yield:String(p.yieldCount||1),
    pack:p.packCost?String(p.packCost):"",
  };
  render();
  const c=document.getElementById("builderCard");if(c)c.scrollIntoView({behavior:"smooth",block:"start"});
}
function cancelEdit(){
  state.editingId=null;
  state.draft={name:"",lines:[],gp:"",margin:"",yield:"",pack:""};
  render();
}
function closePopup(){const o=document.getElementById("overlay");if(o)o.classList.remove("show");}

/* แชร์ให้เพื่อน — ใช้ Web Share API บนมือถือ ถ้าไม่มีก็ก๊อปลิงก์ */
function shareApp(){
  const text=t("shareText")+"\n"+BRAND.pageUrl;
  if(navigator.share){
    navigator.share({title:BRAND.pageName,text:t("shareText"),url:BRAND.pageUrl}).catch(()=>{});
  }else{
    const done=()=>showToast(t("shareCopied"));
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
    }else fallbackCopy(text,done);
  }
}
function fallbackCopy(text,cb){
  const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");cb();}catch(e){}
  document.body.removeChild(ta);
}
let toastTimer;
function showToast(msg){
  const el=document.getElementById("toast");if(!el)return;
  el.textContent=msg;el.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),2600);
}
function updateProd(id,k,v){const p=state.products.find(x=>x.id===id);if(p){let n=Number(v)||0;if(k==="yieldCount")n=n>0?n:1;p[k]=n;save();render();}}
function removeProd(id){state.products=state.products.filter(p=>p.id!==id);save();render();}
